<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C&H Logo Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F2EBE0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 48px;
      font-family: 'Montserrat', sans-serif;
    }

    .row {
      display: flex;
      gap: 40px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .lbl {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #9A8880;
    }

    /* ── Favicon 512×512 ── */
    .fav {
      width: 512px;
      height: 512px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Thumbnail 180×180 ── */
    .fav-sm {
      width: 180px;
      height: 180px;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .line-svg {
      width: 65%;
      display: block;
      overflow: visible;
    }

    .ch {
      display: flex;
      align-items: baseline;
      font-family: 'Pinyon Script', cursive; letter-spacing: -12px;
      line-height: 1;
      position: relative;
      left: -60px;
    }

    /* Variante crema */
    .cream { background: #FDFAF6; }
    .cream .c { color: #2C2320; }
    .cream .amp { color: #D4693A; }
    .cream .line { background: #D4A832; }

    /* Variante ink */
    .ink { background: #2C2320; }
    .ink .c { color: #FDFAF6; }
    .ink .amp { color: #D4693A; }
    .ink .line { background: #D4A832; opacity: 0.6; }

    /* Variante terracotta */
    .terra { background: #D4693A; }
    .terra .c { color: #FDFAF6; }
    .terra .amp { color: #FAE8D8; }
    .terra .line { background: #FAE8D8; opacity: 0.5; }
    .ink .line-svg path, .ink .line-svg circle { stroke: #D4A832; }
    .terra .line-svg path, .terra .line-svg circle { stroke: rgba(250,232,216,0.7); }
  </style>
</head>
<body>

  <!-- 512px — para captura y conversión -->
  <p class="lbl">512 × 512 — para captura</p>
  <div class="row">

    <div class="item">
      <div class="fav cream">
        <div class="ch">
          <span class="c"  style="font-size: 260px;">C</span>
          <span class="amp" style="font-size: 110px; margin: 0 -70px 0 10px; position: relative; top: -60px; z-index: 1;">&#38;</span>
          <span class="c"  style="font-size: 260px;">H</span>
        </div>
        <svg class="line-svg" style="margin-top: 18px;" viewBox="0 0 280 20" fill="none" height="20">
          <path d="M10 10 Q70 3 140 10 Q210 17 270 10" stroke="#C94F4F" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
          <circle cx="140" cy="10" r="2.5" fill="none" stroke="#D4693A" stroke-width="3" opacity="0.9"/>
          <path d="M130 10 Q135 6 140 10 Q145 14 150 10" stroke="#D4693A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
        </svg>
      </div>
      <span class="lbl">Crema</span>
    </div>

    <div class="item">
      <div class="fav ink">
        <div class="ch">
          <span class="c"  style="font-size: 260px;">C</span>
          <span class="amp" style="font-size: 110px; margin: 0 -70px 0 10px; position: relative; top: -60px; z-index: 1;">&#38;</span>
          <span class="c"  style="font-size: 260px;">H</span>
        </div>
        <svg class="line-svg" style="margin-top: 18px;" viewBox="0 0 280 20" fill="none" height="20">
          <path d="M10 10 Q70 3 140 10 Q210 17 270 10" stroke="#C94F4F" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
          <circle cx="140" cy="10" r="2.5" fill="none" stroke="#D4693A" stroke-width="3" opacity="0.9"/>
          <path d="M130 10 Q135 6 140 10 Q145 14 150 10" stroke="#D4693A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
        </svg>
      </div>
      <span class="lbl">Oscuro</span>
    </div>

    <div class="item">
      <div class="fav terra">
        <div class="ch">
          <span class="c"  style="font-size: 260px;">C</span>
          <span class="amp" style="font-size: 110px; margin: 0 -70px 0 10px; position: relative; top: -60px; z-index: 1;">&#38;</span>
          <span class="c"  style="font-size: 260px;">H</span>
        </div>
        <svg class="line-svg" style="margin-top: 18px;" viewBox="0 0 280 20" fill="none" height="20">
          <path d="M10 10 Q70 3 140 10 Q210 17 270 10" stroke="#C94F4F" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
          <circle cx="140" cy="10" r="2.5" fill="none" stroke="#D4693A" stroke-width="3" opacity="0.9"/>
          <path d="M130 10 Q135 6 140 10 Q145 14 150 10" stroke="#D4693A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
        </svg>
      </div>
      <span class="lbl">Terracotta</span>
    </div>

  </div>

  <!-- 180px — para ver cómo quedan pequeños -->
  <p class="lbl" style="margin-top: 16px;">180 × 180 — thumbnail</p>
  <div class="row">

    <div class="fav-sm cream">
      <div class="ch">
        <span class="c"  style="font-size: 90px;">C</span>
        <span class="amp" style="font-size: 38px; margin: 0 -10px; position: relative; top: -20px; z-index: 1;">&#38;</span>
        <span class="c"  style="font-size: 90px;">H</span>
      </div>
      <svg class="line-svg" style="margin-top: 6px;" viewBox="0 0 280 20" fill="none" height="10">
        <path d="M10 10 Q70 3 140 10 Q210 17 270 10" stroke="#C94F4F" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
        <circle cx="140" cy="10" r="2.5" fill="none" stroke="#D4693A" stroke-width="3" opacity="0.9"/>
        <path d="M130 10 Q135 6 140 10 Q145 14 150 10" stroke="#D4693A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      </svg>
    </div>

    <div class="fav-sm ink">
      <div class="ch">
        <span class="c"  style="font-size: 90px;">C</span>
        <span class="amp" style="font-size: 38px; margin: 0 -10px; position: relative; top: -20px; z-index: 1;">&#38;</span>
        <span class="c"  style="font-size: 90px;">H</span>
      </div>
      <svg class="line-svg" style="margin-top: 6px;" viewBox="0 0 280 20" fill="none" height="10">
        <path d="M10 10 Q70 3 140 10 Q210 17 270 10" stroke="#C94F4F" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
        <circle cx="140" cy="10" r="2.5" fill="none" stroke="#D4693A" stroke-width="3" opacity="0.9"/>
        <path d="M130 10 Q135 6 140 10 Q145 14 150 10" stroke="#D4693A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      </svg>
    </div>

    <div class="fav-sm terra">
      <div class="ch">
        <span class="c"  style="font-size: 90px;">C</span>
        <span class="amp" style="font-size: 38px; margin: 0 -10px; position: relative; top: -20px; z-index: 1;">&#38;</span>
        <span class="c"  style="font-size: 90px;">H</span>
      </div>
      <svg class="line-svg" style="margin-top: 6px;" viewBox="0 0 280 20" fill="none" height="10">
        <path d="M10 10 Q70 3 140 10 Q210 17 270 10" stroke="#C94F4F" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
        <circle cx="140" cy="10" r="2.5" fill="none" stroke="#D4693A" stroke-width="3" opacity="0.9"/>
        <path d="M130 10 Q135 6 140 10 Q145 14 150 10" stroke="#D4693A" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      </svg>
    </div>

  </div>

</body>
</html>
